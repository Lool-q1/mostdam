<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتجر | مستدام</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary-green: #76b852; 
            --dark-forest: #102a1d; 
            --white: #ffffff;
        }
        
        body { font-family: 'Almarai', sans-serif; background-color: #f8faf9; margin: 0; direction: rtl; }

        /* الهيدر المتطور */
        .custom-header {
            background: linear-gradient(rgba(16, 42, 29, 0.95), rgba(16, 42, 29, 0.95));
            padding: 20px 60px 80px 60px;
            color: white;
            clip-path: polygon(0 0, 100% 0, 100% 88%, 0 100%);
        }

        .nav-container { display: flex; justify-content: space-between; align-items: center; }
        .nav-right-group { display: flex; align-items: center; gap: 45px; }
        .logo-img { height: 50px; }
        .nav-menu { list-style: none; display: flex; gap: 25px; margin: 0; padding: 0; }
        .nav-menu a { color: white; text-decoration: none; font-weight: 700; font-size: 1rem; transition: 0.3s; }
        .nav-menu a:hover, .nav-menu a.active { color: var(--primary-green); }

        .nav-left-group { display: flex; align-items: center; gap: 15px; }
        .btn-profile { 
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.3); 
            color: white; border-radius: 50px; padding: 7px 18px; font-weight: 700; text-decoration: none;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-exit { background: var(--primary-green); color: white; border-radius: 50px; padding: 7px 22px; font-weight: 700; text-decoration: none; }

        .hero-text { text-align: center; margin-top: 40px; }
        .hero-text h1 { font-weight: 800; font-size: 3rem; }
        .hero-text span { color: var(--primary-green); }

        /* قسم المنتجات */
        .shop-section { padding: 40px 20px; margin-top: -30px; }
        
        .product-card {
            background: white; border-radius: 15px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee;
            height: 100%; transition: 0.3s; display: flex; flex-direction: column;
        }
        .product-card:hover { transform: translateY(-8px); }
        .card-img-top { height: 180px; background: #f0f4f2; display: flex; align-items: center; justify-content: center; }
        .card-body { padding: 25px; text-align: right; flex-grow: 1; }
        .price-tag { color: var(--primary-green); font-weight: 800; font-size: 1.3rem; display: block; margin: 10px 0; }
        
        .btn-purchase { 
            width: 100%; background: var(--dark-forest); color: white; border: none; padding: 12px;
            border-radius: 10px; font-weight: 700; transition: 0.3s; cursor: pointer;
        }
        .btn-purchase:hover { background: var(--primary-green); }

        .empty-msg {
            background: white; padding: 60px; border-radius: 20px;
            border: 2px dashed #ddd; text-align: center; margin-top: 20px;
        }
    </style>
</head>
<body>

    <header class="custom-header">
        <div class="nav-container">
            <div class="nav-right-group">
                <img src="/static/logo1.png" alt="مستدام" class="logo-img"> 
                <ul class="nav-menu">
                    <li><a href="/">الرئيسية</a></li>
                    <li><a href="/programs">البرامج والفعاليات</a></li> 
                    <li><a href="/store" class="active">المتجر</a></li>
                </ul>
            </div>

            <div class="nav-left-group">
                <a href="#" class="btn-profile position-relative me-2" data-bs-toggle="modal" data-bs-target="#cartModal">
                    <i class="fas fa-shopping-basket"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-success" id="cartCount">0</span>
                </a>
                <a href="/profile" class="btn-profile"> <i class="fas fa-user-circle"></i> الملف الشخصي</a>
                <a href="/logout" class="btn-exit">تسجيل خروج</a>
            </div>
        </div>

        <div class="hero-text">
            <h1>متجر <span>مستدام</span></h1>
        </div>
    </header>

    <section class="shop-section container">
        <div class="row g-4" id="productsGrid">
            {% for product in products %}
            <div class="col-md-4">
                <div class="product-card">
                    <div class="card-img-top">
                        <i class="fas fa-box fa-4x text-muted opacity-25"></i>
                    </div>
                    <div class="card-body">
                        <h5 class="card-title fw-bold">{{ product[1] }}</h5>
                        <p class="text-muted small">{{ product[2] }}</p>
                        <span class="price-tag">{{ product[3] }} ر.س</span>
                        <button class="btn-purchase" onclick="addToCart('{{ product[1] }}', {{ product[3] }})">
                            <i class="fas fa-cart-plus"></i> إضافة للسلة
                        </button>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="col-12">
                <div class="empty-msg">
                    <i class="fas fa-store-slash fa-4x mb-3 text-muted"></i>
                    <h3>المتجر قيد التجهيز</h3>
                    <p class="text-muted">سيتم توفير المنتجات قريباً جداً!</p>
                </div>
            </div>
            {% endfor %}
        </div>
    </section>

    <div class="modal fade" id="cartModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">سلة المشتريات</h5>
                    <button type="button" class="btn-close ms-0" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <ul id="cartItemsList" class="list-group mb-3 text-end">
                        </ul>
                    <div class="d-flex justify-content-between fw-bold p-2">
                        <span>الإجمالي:</span>
                        <span><span id="totalPrice">0</span> ر.س</span>
                    </div>
                    <hr>
                    <form action="/checkout" method="POST" id="checkoutForm">
                        <input type="hidden" name="cart_data" id="cartDataInput">
                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold" id="checkoutBtn" disabled>
                            تأكيد عملية الشراء
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let cart = [];
        let total = 0;

        function addToCart(name, price) {
            cart.push({name: name, price: price});
            total += price;
            updateUI();
        }

        function removeFromCart(index) {
            total -= cart[index].price;
            cart.splice(index, 1);
            updateUI();
        }

        function updateUI() {
            // تحديث عدد العناصر في الأيقونة
            document.getElementById('cartCount').innerText = cart.length;
            // تحديث السعر الإجمالي
            document.getElementById('totalPrice').innerText = total;
            
            const list = document.getElementById('cartItemsList');
            list.innerHTML = '';
            
            if (cart.length === 0) {
                list.innerHTML = '<li class="list-group-item text-center text-muted">السلة فارغة</li>';
                document.getElementById('checkoutBtn').disabled = true;
            } else {
                cart.forEach((item, index) => {
                    const li = document.createElement('li');
                    li.className = 'list-group-item d-flex justify-content-between align-items-center';
                    li.innerHTML = `
                        <span>${item.name}</span>
                        <span>
                            <span class="badge bg-light text-dark me-2">${item.price} ر.س</span>
                            <button class="btn btn-sm text-danger" onclick="removeFromCart(${index})">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </span>`;
                    list.appendChild(li);
                });
                document.getElementById('checkoutBtn').disabled = false;
            }

            // تحويل البيانات لنص JSON لإرسالها للبايثون
            document.getElementById('cartDataInput').value = JSON.stringify(cart);
        }
    </script>
</body>
</html>

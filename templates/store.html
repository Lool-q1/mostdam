<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتجر | مستدام</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary-green: #76b852; 
            --dark-forest: #102a1d; 
            --forest-hover: #1a422e;
            --white: #ffffff;
            --soft-bg: #f8faf7;
        }
        
        body { 
            font-family: 'Almarai', sans-serif; 
            background-color: #f8faf9; 
            margin: 0; 
            direction: rtl;
            overflow-x: hidden;
            width: 100%;
        }

        /* --- الهيدر) --- */
        .navbar {
            padding: 20px 0;
            transition: 0.4s;
            z-index: 1000;
            background: transparent;
            width: 100% !important;
        }
        .navbar.scrolled {
            background: rgba(255, 255, 255, 0.98) !important;
            padding: 10px 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .nav-link {
            color: white !important;
            font-weight: 700;
            font-size: 0.95rem;
            margin: 0 12px;
            transition: 0.3s;
        }
        .navbar.scrolled .nav-link { color: var(--dark-forest) !important; }
        
        .btn-profile-nav { 
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50px;
            padding: 8px 20px !important;
            color: white !important;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .navbar.scrolled .btn-profile-nav {
            background: var(--soft-bg);
            border-color: var(--primary-green);
            color: var(--dark-forest) !important;
        }

        /* سلة المشتريات العائمة في النافبار */
        .cart-icon-nav {
            position: relative;
            background: var(--primary-green);
            color: white !important;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-left: 15px;
            transition: 0.3s;
        }
        .cart-icon-nav:hover { transform: scale(1.1); }

        /* --- القسم العلوي Hero (نفس مقاسات البرامج) --- */
        .custom-header {
            background: linear-gradient(135deg, var(--dark-forest) 0%, #1a422e 100%);
            padding: 150px 0 100px 0; /* نفس المسافات */
            color: white;
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 50% 100%, 0 90%);
        }

        .hero-text h1 { font-weight: 800; font-size: clamp(2rem, 5vw, 3.5rem); }
        .hero-text span { color: var(--primary-green); }

        /* --- قسم المنتجات --- */
        .shop-section { padding: 60px 0; position: relative; z-index: 10; }
        
        .product-card {
            background: white; border-radius: 20px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee;
            height: 100%; transition: 0.3s; display: flex; flex-direction: column;
        }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

        .card-img-container { height: 200px; background: #f0f4f2; display: flex; align-items: center; justify-content: center; position: relative; }
        .card-img-container i { font-size: 4rem; color: var(--primary-green); opacity: 0.2; }
        
        .card-body { padding: 25px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-weight: 800; color: var(--dark-forest); font-size: 1.2rem; margin-bottom: 10px; }
        .price-tag { color: var(--primary-green); font-weight: 800; font-size: 1.4rem; margin-bottom: 20px; display: block; }
        
        .btn-purchase { 
            background: var(--dark-forest); color: white; border: none; border-radius: 12px; 
            padding: 12px; font-weight: 700; width: 100%; transition: 0.3s;
        }
        .btn-purchase:hover { background: var(--primary-green); }

        @media (max-width: 991px) {
            .navbar-collapse { background: var(--dark-forest); padding: 20px; border-radius: 20px; margin-top: 10px; }
            .nav-link { margin: 10px 0; text-align: center; }
            .nav-left-group { justify-content: center; margin-top: 15px; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="/static/logo1.png" height="60" alt="Logo"> 
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="/">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link" href="/programs">البرامج والفعاليات</a></li> 
                    <li class="nav-item"><a class="nav-link active" href="/store">المتجر</a></li> 
                    <li class="nav-item d-flex align-items-center ms-lg-3 nav-left-group">
                        <a href="#" class="cart-icon-nav" data-bs-toggle="modal" data-bs-target="#cartModal" title="السلة">
                            <i class="fas fa-shopping-basket"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="cartCount" style="font-size: 0.7rem;">0</span>
                        </a>
                        <a class="btn-profile-nav" href="/profile"><i class="fas fa-user-circle"></i> الملف الشخصي</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="custom-header">
        <div class="container hero-text">
            <h1>متجر <span>مستدام</span></h1>
        </div>
    </header>

    <section class="shop-section container">
        <div class="row g-4" id="productsGrid">
            {% for product in products %}
            <div class="col-12 col-md-6 col-lg-4">
                <div class="product-card">
                    <div class="card-img-container">
                        <i class="fas fa-leaf"></i>
                    </div>
                    <div class="card-body">
                        <h5 class="card-title">{{ product[1] }}</h5>
                        <p class="text-muted small mb-3">{{ product[2] }}</p>
                        <span class="price-tag">{{ product[3] }} ر.س</span>
                        <button class="btn-purchase" onclick="addToCart('{{ product[1]|e }}', '{{ product[3] }}')">
                            <i class="fas fa-cart-plus ms-2"></i> إضافة للسلة
                        </button>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="col-12 text-center py-5">
                <div class="empty-msg bg-white p-5 rounded-4 border shadow-sm">
                    <i class="fas fa-store-slash fa-4x mb-3 text-muted"></i>
                    <h3 class="fw-bold">المتجر قيد التجهيز</h3>
                    <p class="text-muted">نحن نعمل على توفير أفضل المنتجات لكم قريباً!</p>
                </div>
            </div>
            {% endfor %}
        </div>
    </section>

    <div class="modal fade" id="cartModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius: 20px; border: none;">
                <div class="modal-header bg-dark text-white" style="border-radius: 20px 20px 0 0;">
                    <h5 class="modal-title">سلة المشتريات</h5>
                    <button type="button" class="btn-close btn-close-white ms-0" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <ul id="cartItemsList" class="list-group list-group-flush mb-3 text-end"></ul>
                    <div class="d-flex justify-content-between fw-bold p-3 bg-light rounded-3">
                        <span>الإجمالي:</span>
                        <span class="text-success"><span id="totalPrice">0</span> ر.س</span>
                    </div>
                    <form action="/checkout" method="POST" class="mt-4">
                        <input type="hidden" name="cart_data" id="cartDataInput">
                        <button type="submit" class="btn-purchase py-3 fw-bold" id="checkoutBtn" disabled>تأكيد الطلب الآن</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // سكريبت السكرول للنافبار
        window.addEventListener('scroll', function() {
            const nav = document.getElementById('mainNav');
            if (window.scrollY > 50) { nav.classList.add('scrolled'); }
            else { nav.classList.remove('scrolled'); }
        });

        let cart = [];
        let total = 0;

        function addToCart(name, price) {
            price = parseFloat(price);
            cart.push({name: name, price: price});
            total += price;
            updateUI();
        }

        function removeFromCart(index) {
            total -= cart[index].price;
            cart.splice(index, 1);
            updateUI();
        }

        function updateUI() {
            document.getElementById('cartCount').innerText = cart.length;
            document.getElementById('totalPrice').innerText = total.toFixed(2);
            const list = document.getElementById('cartItemsList');
            list.innerHTML = '';
            
            if (cart.length === 0) {
                list.innerHTML = '<li class="list-group-item text-center text-muted border-0 py-4">السلة فارغة حالياً</li>';
                document.getElementById('checkoutBtn').disabled = true;
            } else {
                cart.forEach((item, index) => {
                    const li = document.createElement('li');
                    li.className = 'list-group-item d-flex justify-content-between align-items-center border-0 px-0 mb-2';
                    li.innerHTML = `
                        <span class="fw-bold text-dark">${item.name}</span>
                        <div>
                            <span class="badge bg-light text-dark border me-2">${item.price} ر.س</span>
                            <button class="btn btn-sm btn-outline-danger border-0" onclick="removeFromCart(${index})">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>`;
                    list.appendChild(li);
                });
                document.getElementById('checkoutBtn').disabled = false;
            }
            document.getElementById('cartDataInput').value = JSON.stringify(cart);
        }
    </script>
</body>
</html>

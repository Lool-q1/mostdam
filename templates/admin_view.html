<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الإدارة | المسجلين</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Almarai', sans-serif; background: #f4f7f6; }</style>
</head>
<body class="p-5">
    <div class="container bg-white p-4 shadow-sm rounded-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-success">قائمة المسجلين في الورشات</h2>
            <a href="/" class="btn btn-outline-secondary btn-sm">العودة للرئيسية</a>
        </div>
        
        <table class="table table-hover border">
            <thead class="table-dark">
                <tr>
                    <th>الاسم الكامل</th>
                    <th>البريد الإلكتروني</th>
                    <th>رقم الجوال</th>
                    <th>اسم الورشة</th>
                    <th>تاريخ التسجيل</th>
                </tr>
            </thead>
            <tbody>
                {% for reg in registrations %}
                <tr>
                    <td>{{ reg.full_name }}</td>
                    <td>{{ reg.email }}</td>
                    <td>{{ reg.phone }}</td>
                    <td>{{ reg.event_name }}</td>
                    <td>{{ reg.reg_date }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="5" class="text-center">لا يوجد مسجلين حتى الآن</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>

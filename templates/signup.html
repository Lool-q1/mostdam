<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | مستدام</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #76b852; --dark-forest: #102a1d; --soft-bg: #f4f7f6; }
        body { font-family: 'Almarai', sans-serif; background: var(--soft-bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 15px; }
        .signup-card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 45px rgba(0,0,0,0.08); width: 100%; max-width: 480px; position: relative; }
        .close-btn { position: absolute; top: 20px; right: 20px; width: 35px; height: 35px; background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #333; text-decoration: none; transition: 0.3s; }
        .logo { height: 70px; display: block; margin: 0 auto 15px; }
        h4 { color: var(--dark-forest); text-align: center; font-weight: 800; margin-bottom: 25px; }
        .form-control { border-radius: 12px; padding: 12px; border: 1px solid #e0e0e0; background-color: #fafafa; }
        .btn-submit { background: var(--primary); color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 800; margin-top: 20px; }

        /* تنسيق حقل كلمة المرور مع العين */
        .password-wrapper { position: relative; }
        .toggle-password { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #999; z-index: 10; }

        /* نافذة التنبيه الموحدة */
        #errorOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); display: none; align-items: center;
            justify-content: center; z-index: 9999;
        }
        .custom-modal {
            background: white; padding: 30px; border-radius: 25px;
            width: 90%; max-width: 380px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div id="errorOverlay">
    <div class="custom-modal">
        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #dc3545; margin-bottom: 15px;"></i>
        <h5 style="font-weight: 800; color: #333;">تنبيه</h5>
        <div id="modalMessage" class="mb-4" style="color: #666;"></div>
        <button class="btn w-100 fw-bold" style="background: var(--primary); color: white; border-radius: 12px;" onclick="closeModal()">حسناً</button>
    </div>
</div>

<div class="signup-card">
    <a href="/" class="close-btn"><i class="fas fa-times"></i></a>
    <img src="/static/logo1.png" class="logo" alt="مستدام" onerror="this.style.display='none'">
    <h4>إنشاء حساب جديد</h4>
    
    <form method="POST" action="/signup" id="signupForm">
        <div class="mb-3">
            <label class="fw-bold small mb-2">الاسم الكامل</label>
            <input type="text" name="full_name" class="form-control" placeholder="أدخل اسمك الكامل" required>
        </div>
        
        <div class="mb-3">
            <label class="fw-bold small mb-2">المدينة</label>
            <input type="text" name="city" class="form-control" placeholder="مثال: خميس مشيط" required>
        </div>

        <div class="mb-3">
            <label class="fw-bold small mb-2">رقم الجوال</label>
            <input type="tel" name="phone" id="phone" class="form-control" placeholder="05xxxxxxxx" required>
        </div>

        <div class="mb-3">
            <label class="fw-bold small mb-2">البريد الإلكتروني</label>
            <input type="email" name="email" id="email" class="form-control" placeholder="example@mail.com" required>
        </div>
        
        <div class="mb-3">
            <label class="fw-bold small mb-2">كلمة المرور</label>
            <div class="password-wrapper">
                <input type="password" name="password" id="pass" class="form-control" placeholder="حروف وأرقام، 8 خانات" required>
                <i class="fas fa-eye toggle-password" onclick="togglePass('pass', this)"></i>
            </div>
        </div>
        
        <div class="mb-4">
            <label class="fw-bold small mb-2">تأكيد كلمة المرور</label>
            <div class="password-wrapper">
                <input type="password" id="confirmPass" class="form-control" required>
                <i class="fas fa-eye toggle-password" onclick="togglePass('confirmPass', this)"></i>
            </div>
        </div>
        
        <button type="submit" class="btn btn-submit">تأكيد وإنشاء الحساب</button>
    </form>
    <div class="text-center mt-3 small">لديك حساب؟ <a href="/login" style="color: var(--primary); font-weight: 700; text-decoration: none;">دخول</a></div>
</div>

<script>
    // دالة كشف كلمة المرور
    function togglePass(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }

    function showError(msg) {
        document.getElementById('modalMessage').innerText = msg;
        document.getElementById('errorOverlay').style.display = 'flex';
    }
    function closeModal() { document.getElementById('errorOverlay').style.display = 'none'; }

    document.getElementById('signupForm').onsubmit = function(e) {
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        const pass = document.getElementById('pass').value;
        const confirmPass = document.getElementById('confirmPass').value;

        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(email)) {
            e.preventDefault();
            showError("يرجى إدخال بريد إلكتروني صحيح.");
            return false;
        }

        const phonePattern = /^05\d{8}$/;
        if (!phonePattern.test(phone)) {
            e.preventDefault();
            showError("رقم الجوال يجب أن يبدأ بـ 05 ويتكون من 10 أرقام.");
            return false;
        }

        const passPattern = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;
        if (!passPattern.test(pass)) {
            e.preventDefault();
            showError("يجب أن تكون كلمة المرور 8 خانات على الأقل وتحتوي على حروف وأرقام.");
            return false;
        }

        if (pass !== confirmPass) {
            e.preventDefault();
            showError("كلمتا المرور غير متطابقتين.");
            return false;
        }
    };
</script>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('status') === 'exists') {
        showError("هذا البريد الإلكتروني مسجل مسبقاً.");
    } else if (urlParams.get('status') === 'error') {
        showError("حدث خطأ في قاعدة البيانات.");
    }
</script>

{% with messages = get_flashed_messages(category_filter=["signup_error"]) %}
  {% if messages %}
    <script>showError('{{ messages[0] | safe }}');</script>
  {% endif %}
{% endwith %}

</body>
</html>

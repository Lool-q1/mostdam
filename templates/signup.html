<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | مستدام</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #76b852; 
            --dark-forest: #102a1d; 
            --soft-bg: #f4f7f6;
            --error-red: #dc3545;
            --modal-green: #406343;
        }
        
        body { 
            font-family: 'Almarai', sans-serif; 
            background: var(--soft-bg); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0;
            padding: 15px; /* مساحة حماية للجوال */
        }
        
        .signup-card { 
            background: white; 
            padding: 30px 20px; /* تقليل الحشو قليلاً للجوال */
            border-radius: 25px; 
            box-shadow: 0 15px 45px rgba(0,0,0,0.08); 
            width: 100%; 
            max-width: 480px; 
            position: relative;
        }

        /* تحسين الحشو للشاشات الكبيرة */
        @media (min-width: 576px) {
            .signup-card { padding: 40px; }
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 35px;
            height: 35px;
            background: #eee;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            text-decoration: none;
            transition: 0.3s;
            z-index: 10;
        }
        .close-btn:hover { background: #ddd; transform: rotate(90deg); }
        
        .logo { 
            height: 70px; /* حجم متوازن */
            display: block; 
            margin: 0 auto 15px; 
        }

        h4 {
            color: var(--dark-forest);
            text-align: center;
            font-weight: 800;
            margin-bottom: 25px;
            font-size: 1.3rem; /* حجم خط متجاوب */
        }

        .form-label {
            font-weight: 700;
            color: var(--dark-forest);
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .input-group-text {
            background: #fafafa;
            border-right: none;
            border-radius: 12px 0 0 12px;
            cursor: pointer;
            color: #999;
        }

        .form-control { 
            border-radius: 12px; 
            padding: 12px; 
            border: 1px solid #e0e0e0; 
            background-color: #fafafa;
            font-size: 0.9rem;
        }

        .has-eye { border-left: none; border-radius: 0 12px 12px 0; }

        .btn-submit { 
            background: var(--primary); 
            color: white; 
            border: none; 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            font-weight: 800; 
            margin-top: 20px;
            transition: 0.3s; 
        }

        .btn-submit:hover { background: #5a9e3d; transform: translateY(-2px); }

        /* --- نافذة التنبيه المخصصة (متجاوبة) --- */
        .custom-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .custom-modal {
            background: white;
            padding: 30px 20px;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 3px solid var(--primary);
            position: relative;
        }

        .modal-icon {
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .modal-title {
            font-weight: 800;
            color: var(--dark-forest);
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .modal-body {
            color: #666;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .modal-btn {
            background: var(--modal-green);
            color: white;
            border: none;
            padding: 12px 50px;
            border-radius: 25px;
            font-weight: 700;
            width: 100%;
            transition: 0.3s;
        }

        .login-link { text-align: center; margin-top: 20px; font-size: 0.9rem; }
        .login-link a { color: var(--primary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="custom-modal-overlay" id="modalOverlay">
    <div class="custom-modal">
        <div class="modal-icon">
            <i class="fas fa-leaf"></i>
        </div>
        <div class="modal-title" id="modalTitle">عذراً!</div>
        <div class="modal-body" id="modalMessage">
            كلمتا المرور غير متطابقتين، يرجى التأكد والمحاولة مرة أخرى.
        </div>
        <button class="modal-btn" onclick="closeModal()">حسناً</button>
    </div>
</div>

<div class="signup-card">
    <a href="/" class="close-btn" title="إلغاء">
        <i class="fas fa-times"></i>
    </a>

    <img src="/static/logo1.png" class="logo" alt="مستدام" onerror="this.style.display='none'">
    
    <h4>إنشاء حساب جديد</h4>
    
    <form method="POST" action="/signup" id="signupForm">
        <div class="mb-3">
            <label class="form-label">الاسم الكامل</label>
            <input type="text" name="full_name" id="fullName" class="form-control" placeholder="أدخل اسمك الثلاثي" required>
        </div>

        <div class="mb-3">
            <label class="form-label">البريد الإلكتروني</label>
            <input type="email" name="email" class="form-control" placeholder="example@mail.com" required>
        </div>

        <div class="mb-3">
            <label class="form-label">كلمة المرور</label>
            <div class="input-group" dir="ltr">
                <span class="input-group-text" onclick="togglePass('pass', 'eye1')">
                    <i class="fas fa-eye" id="eye1"></i>
                </span>
                <input type="password" name="password" id="pass" class="form-control has-eye text-end" 
                       placeholder="6 خانات (حروف وأرقام)" 
                       pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{6,}$" required>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">تأكيد كلمة المرور</label>
            <div class="input-group" dir="ltr">
                <span class="input-group-text" onclick="togglePass('confirmPass', 'eye2')">
                    <i class="fas fa-eye" id="eye2"></i>
                </span>
                <input type="password" id="confirmPass" class="form-control has-eye text-end" placeholder="أعد الكتابة" required>
            </div>
        </div>

        <button type="submit" class="btn btn-submit">تأكيد وإنشاء الحساب</button>
    </form>
    
    <div class="login-link">
        لديك حساب بالفعل؟ <a href="/login">سجل دخولك</a>
    </div>
</div>

<script>
    // إظهار وإخفاء كلمة المرور
    function togglePass(id, eyeId) {
        const input = document.getElementById(id);
        const icon = document.getElementById(eyeId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    // وظائف النافذة المنبثقة (Modal)
    function showError(msg) {
        document.getElementById('modalMessage').innerText = msg;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
    }

    // التحقق من الفورم
    document.getElementById('signupForm').onsubmit = function(e) {
        const pass = document.getElementById('pass').value;
        const confirm = document.getElementById('confirmPass').value;

        if (pass !== confirm) {
            e.preventDefault();
            showError("عذراً! كلمتا المرور غير متطابقتين.");
            return false;
        }

        // حفظ بيانات تسجيل الدخول تجريبياً
        localStorage.setItem('username', document.getElementById('fullName').value);
        localStorage.setItem('isLoggedIn', 'true');
        return true;
    };
</script>

</body>
</html>

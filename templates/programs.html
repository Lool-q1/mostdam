<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البرامج والفعاليات | مستدام</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary-green: #76b852; 
            --dark-forest: #102a1d; 
            --white: #ffffff;
        }
        
        body { font-family: 'Almarai', sans-serif; background-color: #f8faf9; margin: 0; direction: rtl; }

        .custom-header {
            background: linear-gradient(rgba(16, 42, 29, 0.95), rgba(16, 42, 29, 0.95));
            padding: 20px 60px 80px 60px;
            color: white;
            clip-path: polygon(0 0, 100% 0, 100% 88%, 0 100%);
        }

        .nav-container { display: flex; justify-content: space-between; align-items: center; }
        .nav-right-group { display: flex; align-items: center; gap: 45px; }
        .logo-img { height: 50px; }
        .nav-menu { list-style: none; display: flex; gap: 25px; margin: 0; padding: 0; }
        .nav-menu a { color: white; text-decoration: none; font-weight: 700; font-size: 1rem; transition: 0.3s; }
        .nav-menu a:hover, .nav-menu a.active { color: var(--primary-green); }
        .nav-left-group { display: flex; align-items: center; gap: 15px; }

        .btn-profile { 
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.3); 
            color: white; border-radius: 50px; padding: 10px 25px; font-weight: 700; text-decoration: none; font-size: .85rem;
        }
        .btn-exit { background: var(--primary-green); color: white; border-radius: 50px; padding: 10px 30px; font-weight: 700; text-decoration: none; font-size: 1.1rem; }

        .hero-text { text-align: center; margin-top: 30px; }
        .hero-text h1 { font-weight: 800; font-size: 3rem; }
        .hero-text span { color: var(--primary-green); }

        .programs-section { padding: 20px; margin-top: -30px; position: relative; z-index: 10; }
        .program-card {
            background: white; border-radius: 20px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee;
            height: 100%; transition: 0.3s; display: flex; flex-direction: column;
        }
        .program-card:hover { transform: translateY(-8px); }

        .program-card.expired { opacity: 0.7; filter: grayscale(0.5); }
        .program-card.expired .btn-reg { background: #adb5bd !important; cursor: not-allowed; }

        .card-img-top { height: 200px; background: #f0f4f2; position: relative; }
        .card-img-top img { width: 100%; height: 100%; object-fit: cover; }
        .badge-type { position: absolute; top: 15px; right: 15px; background: var(--primary-green); color: white; padding: 4px 15px; border-radius: 50px; font-size: 0.75rem; font-weight: bold; }

        .card-body { padding: 20px; text-align: center; flex-grow: 1; }
        .card-title { font-weight: 800; color: var(--dark-forest); font-size: 1.1rem; margin-bottom: 15px; }

        .event-info-box {
            background: #fdfdfd; border: 1px dashed #ddd; border-radius: 12px;
            padding: 10px; margin-bottom: 20px; font-size: 0.85rem; color: #555; text-align: right;
        }
        .info-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .info-item i { color: var(--primary-green); width: 18px; text-align: center; }

        .card-actions { display: flex; gap: 10px; justify-content: center; }
        .btn-detail { background: #f0f4f2; color: var(--dark-forest); border: 1px solid #ddd; border-radius: 12px; padding: 8px 15px; font-weight: 700; font-size: 0.85rem; flex: 1; }
        .btn-reg { background: var(--primary-green); color: white; border: none; border-radius: 12px; padding: 8px 15px; font-weight: 700; font-size: 0.85rem; flex: 1; }

        /* تنسيق المحاور والضيوف داخل المودال */
        .topic-item { background: #f8faf9; border-right: 4px solid var(--primary-green); padding: 12px; margin-bottom: 10px; border-radius: 8px; font-weight: 600; text-align: right; display: flex; justify-content: space-between; align-items: center; }
        
        .speaker-box {
            background: #f1f8ee;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: right;
        }
        .speaker-box i {
            font-size: 1.5rem;
            color: var(--primary-green);
            width: 30px;
            text-align: center;
        }
        .speaker-info small { color: #666; display: block; font-size: 0.75rem; }
        .speaker-info span { font-weight: 700; color: var(--dark-forest); }
    </style>
</head>
<body>

    <header class="custom-header">
        <div class="nav-container container">
            <div class="nav-right-group">
                <img src="/static/logo1.png" alt="مستدام" class="logo-img"> 
                <ul class="nav-menu">
                    <li><a href="/">الرئيسية</a></li>
                    <li><a href="/programs" class="active">البرامج والفعاليات</a></li> 
                    <li><a href="/store">المتجر</a></li>
                </ul>
            </div>
            <div class="nav-left-group">
                <a href="/profile" class="btn-profile"> <i class="fas fa-user-circle"></i> الملف الشخصي</a>
            </div>
        </div>
        <div class="hero-text">
            <h1>برامجنا <span>لمستقبل أفضل</span></h1>
        </div>
    </header>

    <section class="programs-section container">
        <div class="row g-4" id="programsContainer">
            <div class="col-12 col-md-6 col-lg-4" id="card-1">
                <div class="program-card" id="inner-card-1">
                    <div class="card-img-top">
                        <span class="badge-type">ورشة عمل</span>
                        <img src="https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?auto=format&fit=crop&q=80&w=500" alt="الاستدامة">
                    </div>
                    <div class="card-body">
                        <h5 class="card-title">الاستدامة المالية وبناء مستقبل اقتصادي</h5>
                        <div class="event-info-box">
                            <div class="info-item"><i class="fas fa-calendar-day"></i><span>الأربعاء، 13 مايو 2026</span></div>
                            <div class="info-item"><i class="fas fa-clock"></i><span>07:00 مساءً</span></div>
                            <div class="info-item"><i class="fas fa-map-marker-alt"></i><span>عبر مساحة (X)</span></div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-detail" onclick="showDetails('1')">التفاصيل</button>
                            <button class="btn-reg" id="btn-reg-1" onclick="openRegisterModal('1', 'الاستدامة المالية')">سجل الآن</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="modal fade" id="detailsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius: 20px; border: none;">
                <div class="modal-header bg-dark text-white" style="border-radius: 20px 20px 0 0;">
                    <h5 class="modal-title" id="detailTitle"></h5>
                    <button type="button" class="btn-close btn-close-white ms-0" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div id="detailContent"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="registerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content text-center p-4" id="regModalContent" style="border-radius: 20px;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const workshopData = {
            '1': {
                title: "الاستدامة المالية وبناء مستقبل اقتصادي",
                trainer: "أماني الزميلي",
                guest: "حمزة العمري",
                whatsapp: "https://t.co/m2QnPbUaKp", 
                expiryDate: new Date(2026, 4, 13, 19, 0),
                topics: ["الوعي المالي الحديث", "بناء مصادر دخل مستدامة", "الفرص المستقبلية في السعودية", "خطوات عملية لتحقيق الإستقرار المالي"]
            }
        };

        function checkExpirations() {
            const now = new Date();
            for (let id in workshopData) {
                const data = workshopData[id];
                const btn = document.getElementById(`btn-reg-${id}`);
                const card = document.getElementById(`inner-card-${id}`);
                if (now > data.expiryDate) {
                    if (btn) {
                        btn.innerText = "انتهى التسجيل";
                        btn.disabled = true;
                    }
                    if (card) card.classList.add('expired');
                }
            }
        }

        window.onload = checkExpirations;

        function showDetails(id) {
            const data = workshopData[id];
            let html = `<h6 class="fw-bold mb-3" style="color: var(--primary-green); text-align: right;">محاور اللقاء:</h6>`;
            
            // إضافة المحاور
            data.topics.forEach(topic => {
                html += `<div class="topic-item"><span>${topic}</span><i class="fas fa-check-circle text-success ms-2"></i></div>`;
            });

            html += `<hr class="my-4">`;

            // إضافة المدربة والضيف مع الرموز المطلوبة
            html += `
                <div class="row g-2">
                    <div class="col-6">
                        <div class="speaker-box">
                            <i class="fas fa-chalkboard-teacher"></i>
                            <div class="speaker-info">
                                <small>المدربة</small>
                                <span>${data.trainer}</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="speaker-box">
                            <i class="fas fa-microphone-lines"></i>
                            <div class="speaker-info">
                                <small>ضيف اللقاء</small>
                                <span>${data.guest}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('detailContent').innerHTML = html;
            document.getElementById('detailTitle').innerText = data.title;
            new bootstrap.Modal(document.getElementById('detailsModal')).show();
        }

        function openRegisterModal(id, name) {
            if (new Date() > workshopData[id].expiryDate) {
                alert("عذراً، انتهى وقت التسجيل في هذه الورشة.");
                return;
            }
            const container = document.getElementById('regModalContent');
            container.innerHTML = `
                <div class="mb-3"><i class="fas fa-question-circle fa-3x text-primary"></i></div>
                <h5 class="fw-bold">${name}</h5>
                <p class="small text-muted">هل ترغب في تأكيد تسجيلك؟</p>
                <button type="button" class="btn-reg w-100 py-2" onclick="processRegistration('${id}', '${name}')">تأكيد الانضمام</button>
            `;
            new bootstrap.Modal(document.getElementById('registerModal')).show();
        }

        function processRegistration(id, name) {
            const params = new URLSearchParams();
            params.append('event_id', id);

            fetch('/register_event', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString()
            })
            .then(response => {
                if (response.ok) {
                    const data = workshopData[id];
                    const container = document.getElementById('regModalContent');
                    container.innerHTML = `
                        <div class="mb-3"><i class="fas fa-check-circle fa-4x text-success"></i></div>
                        <h5 class="fw-bold">تم تسجيلك بنجاح!</h5>
                        <p class="small text-muted">تمت إضافة الورشة إلى أجندتك.</p>
                        <a href="${data.whatsapp}" target="_blank" class="btn w-100 py-3 mb-2" style="background-color: #25D366; color: white; border-radius: 12px; font-weight: bold; text-decoration: none; display: block;">
                            <i class="fab fa-whatsapp me-2"></i> دخول مجموعة الواتساب
                        </a>
                        <button type="button" class="btn btn-link text-muted mt-2" data-bs-dismiss="modal" style="text-decoration:none">إغلاق</button>
                    `;
                } else {
                    alert("يرجى تسجيل الدخول أولاً لتتمكن من التسجيل في الورشة.");
                }
            })
            .catch(error => {
                alert("تعذر الاتصال بالسيرفر.");
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | مستدام</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary-green: #76b852; --soft-bg: #f4f7f6; }
        body { font-family: 'Almarai', sans-serif; background: var(--soft-bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            position: relative; /* ضروري لتحديد موقع الاكس داخل المربع */
        }

        /* زر الاكس داخل مربع التسجيل */
        .close-card {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 20px;
            color: #ccc;
            text-decoration: none;
            transition: 0.3s;
        }
        .close-card:hover { color: #dc3545; transform: scale(1.1); }

        .btn-submit { background: var(--primary-green); color: white; width: 100%; border-radius: 10px; padding: 12px; border: none; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .btn-submit:hover { background: #5ea343; }
        .form-control { border-radius: 10px; padding: 12px; text-align: right; margin-bottom: 15px; }
        
        /* تنسيق نافذة الخطأ (Modal) */
        #errorModal { 
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.6); z-index:9999; align-items:center; justify-content:center; 
        }
        .modal-content-custom { 
            background:white; padding:30px; border-radius:20px; text-align:center; 
            min-width:300px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
        }
    </style>
</head>
<body>

<div class="login-card">
    <a href="/" class="close-card" title="إغلاق">
        <i class="fas fa-times"></i>
    </a>

    <img src="/static/logo1.png" style="width: 80px; margin-bottom: 15px;" onerror="this.src='https://via.placeholder.com/80'">
    <h4 class="fw-bold mb-4">تسجيل الدخول</h4>

    <form action="/login" method="POST">
        <input type="email" name="email" class="form-control" placeholder="البريد الإلكتروني" required>
        <input type="password" name="password" class="form-control" placeholder="كلمة المرور" required>
        <button type="submit" class="btn btn-submit">دخول</button>
    </form>

    <p class="mt-4 small">ليس لديك حساب؟ <a href="/signup" style="color: var(--primary-green); font-weight: bold; text-decoration: none;">سجل الآن</a></p>
</div>

<div id="errorModal">
    <div class="modal-content-custom">
        <i class="fas fa-exclamation-circle" style="font-size:3rem; color:#dc3545; margin-bottom:15px;"></i>
        <h5 id="msgContent" style="margin-bottom:20px; font-weight:bold; color:#333;"></h5>
        <button onclick="document.getElementById('errorModal').style.display='none'" style="background:#76b852; color:white; border:none; padding:10px 40px; border-radius:10px; font-weight:bold; cursor:pointer;">حسناً</button>
    </div>
</div>

{% with messages = get_flashed_messages(category_filter=["login_error"]) %}
  {% if messages %}
    <script>
        var message = '{{ messages[0] | safe }}';
        if (message) {
            document.getElementById('msgContent').innerText = message;
            document.getElementById('errorModal').style.display = 'flex';
        }
    </script>
  {% endif %}
{% endwith %}

</body>
</html>
